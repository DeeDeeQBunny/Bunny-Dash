<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bunny Dash</title>
    <link rel="stylesheet" href="bunny.css" />
  </head>
  <body>
    <div id="start-screen" class="screen active">
      <div class="page-center">
        <h1>Bunny Dash</h1>
        <button id="start-button" type="button">Start</button>
      </div>
    </div>

    <div id="game-screen" class="screen">
      <div class="game-center">
        <h1>Welcome to Bunnycity!</h1>
        <p>
          Bunny Dash is a game where you have a character exploring a city of
          bunnies called Bunnycity. To feed the bunnies in the city, you need to
          collect carrots in carrot treasure chests. Feeding bunnies help you to
          progress in the game.
        </p>
        <button id="back-button" type="button">Back</button>
      </div>
    </div>

    <script src="bunny.js"></script>
  </body>
</html>
